name: Deploy docs site to GitHub Pages

# Builds the Docusaurus site in website/ and publishes it to GitHub Pages at
# ilmek.aimtune.dev (custom domain set by website/static/CNAME). The site is a
# standalone project — not part of the ts/ pnpm workspace — so it installs on its
# own. A path filter keeps engine-only changes from rebuilding the site.
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel in-progress if a new one starts.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Match the pnpm that generated website/pnpm-lock.yaml and reads the
          # settings in website/pnpm-workspace.yaml (verifyDepsBeforeRun etc.).
          version: 11

      - uses: actions/setup-node@v4
        with:
          # pnpm 11 requires Node ≥ 22.13; 20 fails at pnpm startup.
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
