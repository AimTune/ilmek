name: Release (npm)

# Publishes the @ilmek/* packages to npm. Trigger with the same `v*` tag as the
# NuGet release; a separate file so it versions and fails independently.
#
# Auth: an NPM_TOKEN secret (a granular automation token) for the first publish.
# Once the packages exist you can add an npm trusted-publisher pointing at this
# file (release-npm.yml) and drop the token — provenance is already on via OIDC.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Never publish something that does not build or pass its tests.
      - run: pnpm check

      # Publishes every non-private workspace package in dependency order,
      # rewriting workspace:* to real versions. Already-published versions are
      # skipped, so a re-run after a partial failure is safe.
      - name: pnpm publish
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
